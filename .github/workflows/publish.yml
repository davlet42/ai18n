name: Publish npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm test

      - name: Publish i18n-agent (skip if version already on npm)
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view i18n-agent version 2>/dev/null || echo none)
          if [ "$LOCAL" != "$REMOTE" ]; then npm publish --access public; else echo "i18n-agent@$LOCAL already published — skip"; fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish i18n-agent-nest (skip if version already on npm)
        run: |
          LOCAL=$(node -p "require('./packages/nest/package.json').version")
          REMOTE=$(npm view i18n-agent-nest version 2>/dev/null || echo none)
          if [ "$LOCAL" != "$REMOTE" ]; then npm publish -w i18n-agent-nest --access public; else echo "i18n-agent-nest@$LOCAL already published — skip"; fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
